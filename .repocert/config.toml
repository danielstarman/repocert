schema_version = 1

[checks.fmt]
argv = ["cargo", "fmt", "--check"]

[checks.test]
argv = ["cargo", "test"]

[checks.docs]
argv = ["sh", "-c", "RUSTDOCFLAGS='-D warnings' cargo doc --no-deps"]

[fixers.fmt]
argv = ["cargo", "fmt"]
probe_argv = ["cargo", "fmt", "--check"]

[profiles.default]
checks = ["docs", "fmt", "test"]
fixers = ["fmt"]
certify = true

[[protected_refs]]
pattern = "refs/heads/main"
profile = "default"

[local_policy]
protected_branches = ["refs/heads/main"]
require_clean_primary_checkout = true

[hooks]
mode = "generated"
