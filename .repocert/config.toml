schema_version = 1

[checks.fmt]
argv = ["cargo", "fmt", "--check"]

[checks.test]
argv = ["cargo", "test"]

[checks.clippy]
argv = ["cargo", "clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]

[checks.docs]
argv = ["sh", "-c", "RUSTDOCFLAGS='-D warnings' cargo doc --no-deps"]

[certification]
mode = "ssh-signed"

[[certification.trusted_signer]]
name = "local-repocert"
public_key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPLN4rBuL42E/4VY1nbsmYE6zKg6jmxoAklNrbtY0dFX repocert-signing"

[fixers.fmt]
argv = ["cargo", "fmt"]
probe_argv = ["cargo", "fmt", "--check"]

[profiles.default]
checks = ["fmt", "clippy", "test"]
fixers = ["fmt"]
certify = true
default = true

[profiles.release]
includes = ["default"]
checks = ["docs"]
certify = true

[[protected_refs]]
pattern = "refs/heads/main"
profile = "default"

[[protected_refs]]
pattern = "refs/heads/release/*"
profile = "release"

[[protected_refs]]
pattern = "refs/tags/v*"
profile = "release"

[local_policy]
protected_branches = ["refs/heads/main", "refs/heads/release/*"]
require_clean_primary_checkout = true

[hooks]
mode = "generated"
